name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Import signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          CERT_PATH=$RUNNER_TEMP/certificate.p12

          echo "$CERTIFICATE_P12" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project JiraTimeTracker.xcodeproj \
            -scheme JiraTimeTracker \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            -destination "generic/platform=macOS" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Sign app
        run: |
          APP_PATH=$(find build/DerivedData -name "JiraTimeTracker.app" -type d | head -1)
          echo "App found at: $APP_PATH"

          # Sign the widget extension first
          WIDGET_PATH="$APP_PATH/Contents/PlugIns/JiraWidgetsExtension.appex"
          if [ -d "$WIDGET_PATH" ]; then
            codesign --deep --force --options=runtime \
              --sign "Developer ID Application" \
              --entitlements JiraWidgets/JiraWidgets.entitlements \
              "$WIDGET_PATH"
          fi

          # Sign the main app
          codesign --deep --force --options=runtime \
            --sign "Developer ID Application" \
            --entitlements JiraTimeTracker/JiraTimeTracker.entitlements \
            "$APP_PATH"

          # Verify
          codesign --verify --deep --strict "$APP_PATH"
          echo "Signing verified successfully"

      - name: Notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_PATH=$(find build/DerivedData -name "JiraTimeTracker.app" -type d | head -1)

          ditto -c -k --keepParent "$APP_PATH" build/notarize.zip

          xcrun notarytool submit build/notarize.zip \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple "$APP_PATH"
          rm build/notarize.zip

      - name: Package
        run: |
          APP_PATH=$(find build/DerivedData -name "JiraTimeTracker.app" -type d | head -1)

          # Create .zip
          cd "$(dirname "$APP_PATH")"
          zip -r -y "$GITHUB_WORKSPACE/build/JiraTimeTracker.zip" "JiraTimeTracker.app"
          cd "$GITHUB_WORKSPACE"

          # Create unsigned .pkg
          mkdir -p build/pkg-root/Applications
          cp -R "$APP_PATH" build/pkg-root/Applications/
          pkgbuild \
            --root build/pkg-root \
            --identifier "com.danbasnett.JiraTimeTracker" \
            --version "${GITHUB_REF_NAME#v}" \
            --install-location "/" \
            build/JiraTimeTracker-unsigned.pkg

          # Sign the .pkg with Developer ID Installer certificate
          productsign \
            --sign "Developer ID Installer" \
            build/JiraTimeTracker-unsigned.pkg \
            build/JiraTimeTracker.pkg

          rm build/JiraTimeTracker-unsigned.pkg

      - name: Notarize pkg
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcrun notarytool submit build/JiraTimeTracker.pkg \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait

          xcrun stapler staple build/JiraTimeTracker.pkg

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: false
          generate_release_notes: true
          files: |
            build/JiraTimeTracker.pkg
            build/JiraTimeTracker.zip

      - name: Upload Artifacts
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: JiraTimeTracker
          path: |
            build/JiraTimeTracker.pkg
            build/JiraTimeTracker.zip

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/signing.keychain-db 2>/dev/null || true
